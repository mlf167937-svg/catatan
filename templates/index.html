<!DOCTYPE html>
<html>
<head>
    <title>Catatan Sederhana</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .box {
            width: 400px;
            background: #222;
            padding: 20px;
            border-radius: 10px;
        }

        textarea {
            width: 100%;
            height: 100px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }

        .note {
            background: #333;
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>📝 Catatan</h2>

    <form action="/add" method="POST">
        <textarea name="note" placeholder="Tulis catatan..."></textarea>
        <button type="submit">Tambah</button>
    </form>

    <a href="/download"><button>Download Catatan</button></a>
    <a href="/clear"><button>Hapus Semua</button></a>

    <hr>

    {% for n in notes %}
        <div class="note">{{ n }}</div>
    {% endfor %}
</div>

</body>
</html>
